services:
  ops-pilot:
    image: registry.cn-shenzhen.aliyuncs.com/huazhiy/ops-pilot:latest
    container_name: ops-pilot
    restart: unless-stopped
    ports:
      - "5174:5174"
    volumes:
      - ./server/data:/app/server/data
    environment:
      - PORT=5174
      - HOST=0.0.0.0
      - DATABASE_URL=file:/app/server/data/ops-pilot.db
    mem_limit: 512m
    memswap_limit: 512m
