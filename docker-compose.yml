services:
  ops-pilot:
    image: registry.cn-shenzhen.aliyuncs.com/huazhiy/ops-pilot:latest
    container_name: ops-pilot
    restart: unless-stopped
    ports:
      - "5174:5174"
    volumes:
      - ./server/data:/app/server/data
    environment:
      - PORT=5174
      - HOST=0.0.0.0
      - DATABASE_URL=file:/app/server/data/ops-pilot.db
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD before starting OpsPilot}
      - ADMIN_OTP_RESET_TOKEN=${ADMIN_OTP_RESET_TOKEN:?Set ADMIN_OTP_RESET_TOKEN before starting OpsPilot}
    mem_limit: 512m
    memswap_limit: 512m
