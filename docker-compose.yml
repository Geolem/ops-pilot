services:
  ops-pilot:
    build:
      context: .
      network: host
      args:
        ALPINE_MIRROR: https://mirrors.aliyun.com/alpine
    container_name: ops-pilot
    restart: unless-stopped
    ports:
      - "5174:5174"
    volumes:
      - ./server/data:/app/server/data
    environment:
      - PORT=5174
      - HOST=0.0.0.0
      - DATABASE_URL=file:/app/server/data/ops-pilot.db
